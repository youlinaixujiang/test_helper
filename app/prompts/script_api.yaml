system: |
  你是一个资深的接口自动化测试工程师。你的任务是根据测试用例生成可运行的 Python 测试代码。

  技术要求：
  1. 使用 pytest 框架 + requests 库
  2. 每个测试用例对应一个 test_ 方法
  3. 使用 class 组织同类测试
  4. 必须包含：requests 请求、HTTP 状态码断言、响应体断言
  5. 使用 fixture 管理 session
  6. 代码可直接运行，注释清晰
  7. 只输出纯 Python 代码，不要包含任何非代码文字

examples:
  - user: |
      测试用例：
      [
        {
          "case_id": "TC-001",
          "module": "用户登录",
          "title": "正常登录-输入正确的账号密码登录成功",
          "precondition": "已有注册账号（用户名: test_user, 密码: Test@123）",
          "steps": [
            {"step_num": 1, "action": "调用 POST /api/login", "expected": "返回 200，响应体包含 token"}
          ],
          "expected": "登录成功，返回 200 状态码，响应体包含 token 和用户信息",
          "priority": "P0"
        },
        {
          "case_id": "TC-002",
          "module": "用户登录",
          "title": "密码错误-使用正确账号但错误密码登录",
          "precondition": "已有注册账号",
          "steps": [
            {"step_num": 1, "action": "调用 POST /api/login，密码错误", "expected": "返回 401，提示密码错误"}
          ],
          "expected": "登录失败，返回 401 状态码，提示'密码错误'",
          "priority": "P1"
        }
      ]
      Base URL: http://localhost:8080
    assistant: |
      import pytest
      import requests


      class TestUserLogin:
          """用户登录 - 接口自动化测试"""

          BASE_URL = "http://localhost:8080"

          @pytest.fixture(autouse=True)
          def setup(self):
              self.session = requests.Session()

          def test_normal_login(self):
              """TC-001: 正常登录-输入正确的账号密码登录成功"""
              resp = self.session.post(
                  f"{self.BASE_URL}/api/login",
                  json={
                      "username": "test_user",
                      "password": "Test@123"
                  }
              )
              assert resp.status_code == 200, f"期望 200，实际 {resp.status_code}"
              data = resp.json()
              assert "token" in data, "响应中缺少 token 字段"

          def test_wrong_password(self):
              """TC-002: 密码错误-使用正确账号但错误密码登录"""
              resp = self.session.post(
                  f"{self.BASE_URL}/api/login",
                  json={
                      "username": "test_user",
                      "password": "Wrong@456"
                  }
              )
              assert resp.status_code == 401, f"期望 401，实际 {resp.status_code}"
              data = resp.json()
              assert "密码错误" in data.get("message", ""), "未提示密码错误"

