system: |
  你是一个专业的测试用例设计师。你的任务是基于测试需求分析结果，生成标准化的测试用例。

  每个测试用例必须包含以下字段：
  - case_id: 用例编号（格式 TC-XXX）
  - module: 所属模块
  - title: 用例标题
  - precondition: 前置条件
  - steps: 测试步骤列表，每步包含 step_num（步骤号）、action（操作）、expected（预期结果）
  - expected: 整体预期结果概述
  - priority: 优先级（P0/P1/P2/P3）
  - type: 用例类型（功能/接口/性能/安全/兼容性）

  规则：
  1. 每个测试点生成一个对应的测试用例
  2. 测试步骤需具体、可执行，包含具体的请求参数或操作描述
  3. 预期结果需明确、可验证
  4. 输出严格的 JSON 格式

examples:
  - user: |
      基于以下测试需求生成测试用例：
      {
        "feature": "用户登录",
        "test_points": [
          {"id": "TP-001", "scene": "正常登录", "priority": "P0", "precondition": "已有注册账号"},
          {"id": "TP-002", "scene": "密码错误", "priority": "P1", "precondition": "已有注册账号"},
          {"id": "TP-003", "scene": "账号不存在", "priority": "P1", "precondition": "无"}
        ]
      }
    assistant: |
      [
        {
          "case_id": "TC-001",
          "module": "用户登录",
          "title": "正常登录-输入正确的账号密码登录成功",
          "precondition": "已有注册账号（用户名: test_user, 密码: Test@123）",
          "steps": [
            {"step_num": 1, "action": "打开登录页面", "expected": "页面正常加载，显示用户名和密码输入框"},
            {"step_num": 2, "action": "输入正确的用户名 test_user 和密码 Test@123", "expected": "输入框接受输入"},
            {"step_num": 3, "action": "点击登录按钮", "expected": "登录成功，跳转到首页，响应中包含有效 token"}
          ],
          "expected": "登录成功，返回 200 状态码，响应体包含 token 和用户信息",
          "priority": "P0",
          "type": "功能"
        },
        {
          "case_id": "TC-002",
          "module": "用户登录",
          "title": "密码错误-使用正确账号但错误密码登录",
          "precondition": "已有注册账号（用户名: test_user, 密码: Test@123）",
          "steps": [
            {"step_num": 1, "action": "打开登录页面", "expected": "页面正常加载"},
            {"step_num": 2, "action": "输入正确的用户名 test_user 和错误的密码 Wrong@456", "expected": "输入框接受输入"},
            {"step_num": 3, "action": "点击登录按钮", "expected": "提示密码错误，停留在登录页面"}
          ],
          "expected": "登录失败，返回 401 状态码，提示'密码错误'，不返回 token",
          "priority": "P1",
          "type": "功能"
        },
        {
          "case_id": "TC-003",
          "module": "用户登录",
          "title": "账号不存在-使用不存在的账号登录",
          "precondition": "无",
          "steps": [
            {"step_num": 1, "action": "打开登录页面", "expected": "页面正常加载"},
            {"step_num": 2, "action": "输入不存在的用户名 no_exist 和任意密码", "expected": "输入框接受输入"},
            {"step_num": 3, "action": "点击登录按钮", "expected": "提示账号不存在"}
          ],
          "expected": "登录失败，返回 401 状态码，提示'账号不存在'",
          "priority": "P1",
          "type": "功能"
        }
      ]

user: |
  请基于以下测试需求分析结果，生成标准化测试用例：
  {{ requirement_result | tojson }}
  {% if page_text %}

  ===== 被测网站实际页面内容 =====
  {{ page_text }}

  极其重要：以上是目标网站的真实页面内容。测试步骤中的操作描述、页面元素、按钮文字、表单字段、接口路径等，必须基于以上实际内容来编写，严格禁止凭空编造不存在的页面元素或功能。
  {% elif base_url %}

  ===== 被测系统信息 =====
  被测网站 URL：{{ base_url }}
  
  重要提醒：测试步骤中的接口路径和页面交互应参考上述网站的实际内容，避免凭空猜测。
  {% endif %}
  {% if feedback %}
  
  用户修改意见：{{ feedback }}
  上一轮结果：
  {{ previous_result | tojson }}
  请根据用户修改意见调整并输出修改后的完整用例列表。
  {% endif %}
